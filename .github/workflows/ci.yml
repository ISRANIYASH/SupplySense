# ============================================================
# GitHub Actions — Continuous Integration
# SupplySense AI Supply Chain OS
# ============================================================
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"
  PNPM_VERSION: "8"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Frontend: Lint & Type-check ──────────────────────────────
  lint-and-typecheck:
    name: "Frontend — Lint & Type Check"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm --filter=@supplysense/web lint
        continue-on-error: false

      - name: TypeScript type check
        run: pnpm --filter=@supplysense/web exec tsc --noEmit --project tsconfig.json

      - name: Check shared package types
        run: pnpm --filter=@supplysense/shared exec tsc --noEmit

      - name: Prettier format check
        run: pnpm prettier --check "**/*.{ts,tsx,js,jsx,json,css,md}" --ignore-path .prettierignore

  # ── Backend: Lint, Type-check & Tests ───────────────────────
  test-backend:
    name: "Backend — Lint, Types & Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     supplysense
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB:       supplysense_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL:      postgresql://supplysense:testpassword@localhost:5432/supplysense_test
      REDIS_URL:         redis://localhost:6379/0
      ENVIRONMENT:       test
      SECRET_KEY:        ci-test-secret-key-not-for-production
      JWT_SECRET:        ci-jwt-secret-not-for-production
      OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY_TEST }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Install uv
        run: pip install uv

      - name: Install API dependencies
        run: uv pip install --system -r apps/api/requirements.txt

      - name: Install test dependencies
        run: uv pip install --system pytest pytest-asyncio pytest-cov httpx ruff mypy

      - name: Run Ruff linter
        run: ruff check apps/api/ packages/

      - name: Run Ruff formatter check
        run: ruff format --check apps/api/ packages/

      - name: Run MyPy type checker
        run: mypy apps/api/ --ignore-missing-imports --strict
        continue-on-error: true  # non-blocking for now

      - name: Run API tests
        run: |
          pytest apps/api/tests/ \
            --cov=apps/api \
            --cov-report=xml \
            --cov-report=term-missing \
            --asyncio-mode=auto \
            -v \
            --tb=short \
            --timeout=60
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── ML Package Tests ─────────────────────────────────────────
  test-ml:
    name: "ML Package — Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: packages/ml/requirements.txt

      - name: Install uv
        run: pip install uv

      - name: Install ML dependencies
        run: uv pip install --system -r packages/ml/requirements.txt

      - name: Run ML unit tests
        run: |
          pytest packages/ml/tests/ \
            --cov=packages/ml \
            --cov-report=xml \
            -v \
            --tb=short \
            --timeout=120
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Upload ML coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          flags: ml
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── Build ─────────────────────────────────────────────────────
  build:
    name: "Build — Docker Images"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint-and-typecheck, test-backend, test-ml]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js app
        run: pnpm --filter=@supplysense/web build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Build Docker image — Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file:    infra/docker/Dockerfile.web
          push:    false
          tags:    supplysense/web:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build Docker image — API
        uses: docker/build-push-action@v5
        with:
          context: .
          file:    infra/docker/Dockerfile.api
          push:    false
          tags:    supplysense/api:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build Docker image — ML
        uses: docker/build-push-action@v5
        with:
          context: .
          file:    infra/docker/Dockerfile.ml
          push:    false
          tags:    supplysense/ml:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Security Scan ─────────────────────────────────────────────
  security:
    name: "Security — Trivy & Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref:  .
          format:    sarif
          output:    trivy-results.sarif
          severity:  CRITICAL,HIGH

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: npm audit
        run: |
          npm audit --audit-level=high --json > npm-audit.json || true
          cat npm-audit.json

      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r apps/api/requirements.txt --format json || true
