# ============================================================
# Prometheus Configuration — SupplySense
# ============================================================
global:
  scrape_interval:     15s   # How frequently to scrape targets
  evaluation_interval: 15s   # How frequently to evaluate rules
  scrape_timeout:      10s

  # Attach labels to any time series or alerts from this server
  external_labels:
    cluster:     'supplysense'
    environment: 'production'

# ── Alerting ─────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# ── Rule files ───────────────────────────────────────────────
rule_files:
  - "/etc/prometheus/rules/*.yml"

# ── Scrape configs ───────────────────────────────────────────
scrape_configs:

  # ── Prometheus self-monitoring ──────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics
    scrape_interval: 15s

  # ── SupplySense FastAPI ─────────────────────────────────────
  - job_name: 'supplysense-api'
    static_configs:
      - targets: ['supplysense-api:8000']
        labels:
          service:  'api'
          language: 'python'
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # ── SupplySense ML Serving ──────────────────────────────────
  - job_name: 'supplysense-ml'
    static_configs:
      - targets: ['supplysense-ml:3001']
        labels:
          service:  'ml'
          language: 'python'
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # ── Node Exporter (host metrics) ────────────────────────────
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'infrastructure'
    metrics_path: /metrics
    scrape_interval: 15s

  # ── Kafka JMX Exporter ──────────────────────────────────────
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9308']   # kafka-exporter default port
        labels:
          service: 'messaging'
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    # JMX direct scrape fallback
  - job_name: 'kafka-jmx'
    static_configs:
      - targets: ['kafka:9092']
        labels:
          service: 'messaging-jmx'
    metrics_path: /metrics
    scrape_interval: 30s

  # ── PostgreSQL Exporter ─────────────────────────────────────
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service:  'database'
          db_type:  'postgresql'
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # ── Redis Exporter ───────────────────────────────────────────
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service:  'cache'
          db_type:  'redis'
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  # ── Airflow ──────────────────────────────────────────────────
  - job_name: 'airflow'
    static_configs:
      - targets: ['airflow-webserver:8080']
        labels:
          service: 'orchestration'
    metrics_path: /admin/metrics
    scrape_interval: 30s

  # ── MLflow ───────────────────────────────────────────────────
  - job_name: 'mlflow'
    static_configs:
      - targets: ['mlflow:5000']
        labels:
          service: 'ml-tracking'
    metrics_path: /metrics
    scrape_interval: 30s

  # ── Cadvisor (container metrics) ────────────────────────────
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          service: 'container-metrics'
    metrics_path: /metrics
    scrape_interval: 15s
