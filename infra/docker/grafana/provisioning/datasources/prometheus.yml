# ============================================================
# Grafana Datasource — Prometheus
# ============================================================
apiVersion: 1

datasources:
  - name:      Prometheus
    type:      prometheus
    access:    proxy
    uid:       prometheus-ds
    url:       http://prometheus:9090
    isDefault: true
    editable:  false
    jsonData:
      httpMethod:          POST
      prometheusType:      Prometheus
      prometheusVersion:   "2.45.0"
      cacheLevel:          Medium
      disableMetricsLookup: false
      timeInterval:        "15s"
      exemplarTraceIdDestinations:
        - name:           traceID
          datasourceUid:  tempo-ds
    secureJsonData: {}

  - name:    Loki
    type:    loki
    access:  proxy
    uid:     loki-ds
    url:     http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000

  - name:    Tempo
    type:    tempo
    access:  proxy
    uid:     tempo-ds
    url:     http://tempo:3200
    editable: false
    jsonData:
      tracesToLogs:
        datasourceUid:  loki-ds
        filterByTraceID: true
      serviceMap:
        datasourceUid: prometheus-ds
      search:
        hide: false
      nodeGraph:
        enabled: true
