version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: supplysense_postgres
    environment:
      POSTGRES_DB: supplysense
      POSTGRES_USER: supplysense_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_supplysense_pwd_2026}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
